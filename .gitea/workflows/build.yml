name: Build and Deploy Bitwarden Update Package

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build-and-push:
    runs-on: testing-runner
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Version
        id: vars
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="1.0.${{ github.run_number }}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Prepare Package Structure
        run: |
          mkdir -p build/DEBIAN build/usr/local/bin build/etc/systemd/system
          
          # Копіювання файлів
          cp DEBIAN/* build/DEBIAN/
          cp usr/local/bin/* build/usr/local/bin/
          cp etc/systemd/system/* build/etc/systemd/system/
          
          # Налаштування прав (важливо для .deb)
          chmod 755 build/DEBIAN/postinst
          chmod +x build/usr/local/bin/update-bitwarden.sh
          chmod 644 build/etc/systemd/system/bitwarden-update.*
          
          # Оновлення версії в control
          sed -i "s/^Version:.*/Version: ${{ env.VERSION }}/" build/DEBIAN/control

      - name: Build .deb Package
        run: |
          PACKAGE_NAME="bitwarden-autoupdate_${{ env.VERSION }}_all.deb"
          dpkg-deb --build build "$PACKAGE_NAME"
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV

      - name: Upload to Gitea Debian Registry
        run: |
          # Переконайся, що секрети GITEA_TOKEN та GITEA_URL додані в репозиторій
          curl --user "${{ github.actor }}:${{ secrets.TOKEN }}" \
               --upload-file "${{ env.PACKAGE_NAME }}" \
               "${{ vars.URL }}/api/packages/${{ github.repository_owner }}/debian/pool/stable/main/upload"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bitwarden-package
          path: "*.deb"